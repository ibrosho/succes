<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Runner</title>
    <link rel="stylesheet" href="runner.css">
</head>
<body>
    <div id="ui-layer">
        <div class="stats">
            <div id="score">Score: 0</div>
            <div id="coins">Coins: 0</div>
        </div>
        <div id="instructions">W/Space: Jump | S: Slide | A/D: Move</div>
        <button id="pause-btn" onclick="togglePause()">II</button>
    </div>
    <canvas id="runnerCanvas"></canvas>

    <div id="menu-overlay" class="overlay">
        <h1 id="menu-title">CYBER RUNNER</h1>
        <button id="start-btn" onclick="startGame()">START RUN</button>
    </div>

    <div id="game-over" class="overlay" style="display:none;">
        <h1>CRASHED!</h1>
        <button onclick="location.reload()">REBOOT</button>
    </div>
    <script src="runner.js"></script>
</body>
</html>
